services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: github_sentiment
      MYSQL_USER: github_sentiment
      MYSQL_PASSWORD: change-me
      MYSQL_ROOT_PASSWORD: change-root-password
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pchange-root-password"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:

